name: casino_dealers_flow
description: "Premium offline utility app for professional casino dealers."
publish_to: 'none'

version: 1.0.0+5

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  # Core UI
  cupertino_icons: ^1.0.8
  
  # Database - 100% OFFLINE
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  
  # Utilities
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  uuid: ^4.2.1
  file_picker: ^8.1.6
  share_plus: ^7.2.1
  csv: ^5.1.1
  
  # Features
  table_calendar: ^3.0.9
  flutter_inappwebview: ^6.0.0
  image_picker: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/
    - assets/icon.png
    - assets/main-bg-min.jpg
    - assets/dealer-avatar.png

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true

